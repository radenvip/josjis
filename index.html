<!DOCTYPE html>
<html lang="id">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <title>KANG RADEN - VIP JOSJIS</title>

    <meta property="og:title" content="KANG RADEN - VIP JOSJIS">
    <meta property="og:description" content="Eksklusif Member RADEN - Angka Mutlak Josjis">
    <meta property="og:image" content="https://i.ibb.co/vv3ZmMyx/image.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/radenvip/josjis">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.cdnfonts.com/css/ds-digital');

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #111111;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.8);
            --card-border: rgba(255,255,255,0.08);
            --accent-gold: #D4AF37;
            --neon-yellow: #facc15;
            --neon-orange: #fb923c;
            --neon-blue: #38bdf8;
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --text-color: #1a1a1a;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.1);
            --card-border: rgba(0,0,0,0.08);
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; transition: 0.4s; overflow-x: hidden; }

        .app-header { display: flex; align-items: center; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 1000; }
        .header-logo { width: 35px; height: 35px; margin-right: 12px; border-radius: 5px; }
        .header-title { font-family: 'Montserrat'; font-weight: 900; color: var(--accent-gold); font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }

        .content-padding { padding: 15px; padding-bottom: 100px; }

        .tab-container { text-align: center; margin-bottom: 20px; margin-top: 10px; }
        .tab-menu { display: inline-flex; background: var(--card-bg); padding: 6px; border-radius: 50px; border: 1px solid var(--card-border); box-shadow: var(--card-shadow); }
        .tab-btn { border: none; background: transparent; color: #888; padding: 10px 25px; border-radius: 50px; font-weight: 700; font-size: 11px; text-transform: uppercase; transition: 0.3s; cursor: pointer; font-family: 'Rajdhani'; }
        #b0.active { background: var(--neon-yellow); color: #000; box-shadow: 0 4px 15px rgba(250, 204, 21, 0.4); }
        #b1.active { background: var(--neon-orange); color: #000; box-shadow: 0 4px 15px rgba(251, 146, 60, 0.4); }
        #b2.active { background: var(--neon-blue); color: #000; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }

        .search-row { display: flex; gap: 10px; width: 100%; max-width: 400px; margin: 0 auto 15px; align-items: center; }
        #searchInput { flex: 1; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 18px; padding: 12px; color: var(--text-color); font-family: 'Rajdhani'; font-weight: 700; text-align: center; outline: none; box-shadow: var(--card-shadow); }

        .grid-container { display: none; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .grid-container.active { display: grid; }
        .card-mini { background: var(--card-bg); border-radius: 28px; overflow: hidden; position: relative; transition: 0.3s; display: flex; flex-direction: column; align-items: center; padding-bottom: 15px; box-shadow: var(--card-shadow); border: 1px solid var(--card-border); cursor: pointer; }
        
        #g0 .card-mini { border-bottom: 4px solid var(--neon-yellow); }
        #g1 .card-mini { border-bottom: 4px solid var(--neon-orange); }
        #g2 .card-mini { border-bottom: 4px solid var(--neon-blue); }

        .skeleton { background: #1a1a1a; height: 160px; border-radius: 28px; border: 1px solid var(--card-border); position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .cm-header { padding: 18px 10px 5px; text-align: center; }
        .cm-title { font-family: 'Montserrat'; font-weight: 900; font-size: 13px; text-transform: uppercase; color: var(--text-color); line-height: 1.2; }
        .cm-date { font-size: 10px; color: #777; font-weight: 700; margin-top: 3px; letter-spacing: 1px; }
        .cm-timer-box { background: rgba(0,0,0,0.08); width: 88%; padding: 8px 5px; border-radius: 20px; border: 1px solid var(--card-border); margin-bottom: 12px; text-align: center; }
        .cm-timer-value { font-family: 'DS-Digital'; font-size: 28px; line-height: 1; }
        
        .cm-btn { width: 88%; padding: 12px; border-radius: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; border: none; cursor: pointer; color: #000; letter-spacing: 1px; transition: all 0.2s ease; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 2px 3px rgba(255,255,255,0.4); }
        .cm-btn::after { content: ''; position: absolute; top: -50%; left: -100%; width: 50%; height: 200%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent); transform: rotate(30deg); animation: button-shimmer 4s infinite; }
        @keyframes button-shimmer { 0% { left: -100%; } 20% { left: 150%; } 100% { left: 150%; } }

        .footer-marquee { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--card-border); padding: 10px 0; overflow: hidden; white-space: nowrap; z-index: 1000; }
        .marquee-text { display: inline-block; font-family: 'Montserrat'; font-weight: 900; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; animation: smooth-scroll 20s linear infinite; }
        @keyframes smooth-scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #login-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; justify-content: center; align-items: center; padding: 20px; }
        .login-box { text-align: center; width: 100%; max-width: 350px; }
        .login-logo { width: 150px; height: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4)); }
        .login-box h2 { font-family: 'Montserrat'; font-weight: 900; color: var(--accent-gold); margin: 0; letter-spacing: 2px; }
        .login-box input { padding: 18px; border-radius: 15px; border: 1px solid #333; background: #111; color: #fff; width: 100%; margin: 20px 0 15px; text-align: center; font-size: 20px; font-weight: 900; box-sizing: border-box; }

        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); border-radius: 35px; width: 92%; max-width: 450px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--card-border); position: relative; padding-bottom: 20px; }
        .close-btn { position: absolute; right: 15px; top: 15px; background: var(--accent-gold); color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 10; }
        .modal-header { padding: 25px 20px 10px; text-align: center; }
        .modal-header h3 { font-family: 'Montserrat'; font-weight: 900; margin: 0; color: var(--text-color); }
        .divider { background: rgba(212, 175, 55, 0.05); color: var(--accent-gold); font-family: 'Montserrat'; font-weight: 900; font-size: 11px; padding: 8px; text-align: center; border-top: 1px solid var(--card-border); margin: 10px 0; }
        .modal-table { width: 100%; border-collapse: collapse; }
        .modal-table td { padding: 6px 20px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .val-text { color: #fff; font-size: 14px; text-align: right; font-weight: 900; }
        
        .btn-pasang { display: block; width: 85%; margin: 15px auto 5px; padding: 15px 0; border-radius: 18px; background: linear-gradient(135deg, #D4AF37 0%, #FACC15 50%, #8A6E2F 100%); background-size: 200% auto; color: #000; font-family: 'Montserrat'; font-weight: 900; font-size: 13px; text-decoration: none; text-transform: uppercase; text-align: center; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4); animation: shine 3s linear infinite, heartbeat 1.5s ease-in-out infinite; }
        @keyframes shine { 0% { background-position: 0% center; } 50% { background-position: 100% center; } 100% { background-position: 0% center; } }
        @keyframes heartbeat { 0% { transform: scale(1); } 14% { transform: scale(1.08); } 28% { transform: scale(1); } 42% { transform: scale(1.08); } 70% { transform: scale(1); } }

        @media (max-width: 600px) { .grid-container.active { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
    </style>
</head>
<body onload="initApp()">

    <div id="login-screen">
        <div class="login-box">
            <img src="https://i.postimg.cc/43Q4SGNF/SCR-20260410-ousn.png" class="login-logo">
            <h2>KANG RADEN</h2>
            <p style="color:#fff; font-weight:900; text-transform:uppercase; margin-top:-5px;">VIP ACCESS</p>
            <input type="password" id="sandiInput" placeholder="PIN MEMBER" inputmode="numeric">
            <button onclick="manualLogin()" style="width:100%; padding:18px; border-radius:15px; border:none; background:var(--accent-gold); color:#000; font-family:'Montserrat'; font-weight:900; cursor:pointer;">MASUK SISTEM</button>
            <div id="pesan-error" style="color:#ff4444; font-size:12px; margin-top:10px; display:none; font-weight:bold;">PIN INVALID!</div>
        </div>
    </div>

    <div id="main-app">
        <header class="app-header">
            <img src="https://i.postimg.cc/43Q4SGNF/SCR-20260410-ousn.png" class="header-logo">
            <div class="header-title">KANG RADEN VIP</div>
            <button onclick="toggleTheme()" style="margin-left:auto; background:none; border:none; color:var(--accent-gold); cursor:pointer;">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24" id="themeIcon"><path d="M12 7a5 5 0 100 10 5 5 0 000-10zM2 13h2a1 1 0 100-2H2a1 1 0 100 2zm18 0h2a1 1 0 100-2h-2a1 1 0 100 2zM11 2v2a1 1 0 102 0V2a1 1 0 10-2 0zm0 18v2a1 1 0 102 0v-2a1 1 0 10-2 0z"/></svg>
            </button>
        </header>

        <div class="content-padding">
            <div class="tab-container">
                <div id="tabMenu" class="tab-menu">
                    <button id="b0" class="tab-btn active" onclick="openTab(0)">Pagi</button>
                    <button id="b1" class="tab-btn" onclick="openTab(1)">Siang</button>
                    <button id="b2" class="tab-btn" onclick="openTab(2)">Malam</button>
                </div>
            </div>

            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Cari Pasaran..." onkeyup="searchPasaran()">
            </div>

            <div id="g0" class="grid-container active"></div>
            <div id="g1" class="grid-container"></div>
            <div id="g2" class="grid-container"></div>
            <div id="searchGrid" class="grid-container"></div>
        </div>

        <div class="footer-marquee">
            <div class="marquee-text">--- RUMUS ANDALAN RADEN --- KANG RADEN VIP PREDICTION --- SALAM JOSJISS!! --- SIAP JEBOL BRANKAS BANDOT ---</div>
        </div>
    </div>

    <div id="prediksiModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwbNAAAWRC2IsLW_ZsyZfcq3SOqgXr8RFqhxGJTrcTE6cZDl0y2QDGAeXnDP5uXUQ54/exec";
        let globalPrediksiData = []; let LINK_PASANG_SEKARANG = ""; let currentActiveTab = 0;

        const jadwalPasaran = {
            "totomacau pagi": { time: "00:00", off: [] }, "singapore": { time: "17:30", off: [2, 5] }, "hongkong lotto": { time: "22:59", off: [] }
        };

        function initApp() {
            showSkeletons();
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme === 'light') document.body.classList.add('light-mode');
            
            fetch(`${API_URL}?action=getPublicSettings`)
                .then(res => res.json())
                .then(s => { if(s && s.wa) LINK_PASANG_SEKARANG = s.referral; });

            const savedSandi = localStorage.getItem('member_sandi');
            if (savedSandi) autoLogin(savedSandi);
            else document.getElementById('login-screen').style.display = 'flex';
        }

        function showSkeletons() {
            for(let i=0; i<3; i++) document.getElementById('g'+i).innerHTML = '<div class="skeleton"></div>'.repeat(6);
        }

        function autoLogin(sandi) {
            fetch(`${API_URL}?action=getPrediksiData&sandi=${sandi}`)
                .then(res => res.json())
                .then(response => { if (response !== "SALAH") handleDataSuccess(response); });
        }

        function manualLogin() {
            let sandi = document.getElementById('sandiInput').value;
            fetch(`${API_URL}?action=getPrediksiData&sandi=${sandi}`)
                .then(res => res.json())
                .then(response => {
                    if (response === "SALAH") document.getElementById('pesan-error').style.display = 'block';
                    else { localStorage.setItem('member_sandi', sandi); handleDataSuccess(response); }
                });
        }

        function handleDataSuccess(response) {
            document.getElementById('login-screen').style.display = 'none';
            globalPrediksiData = response.cards;
            if (response.referral) LINK_PASANG_SEKARANG = response.referral;
            openTab(0);
            setInterval(updateAllTimers, 1000);
        }

        function generateCardHTML(item, tabIdx) {
            const colors = ['var(--neon-yellow)', 'var(--neon-orange)', 'var(--neon-blue)'];
            return `<div class="card-mini" data-pasaran="${item.pasaran}" onclick="showModalDirect('${btoa(JSON.stringify(item))}')">
                <div class="cm-header"><div class="cm-title">${item.pasaran}</div><div class="cm-date">${item.tanggal}</div></div>
                <div class="cm-timer-box"><div class="cm-timer-value">00:00:00</div></div>
                <button class="cm-btn" style="background:${colors[tabIdx] || 'var(--accent-gold)'}">PREDIKSI</button></div>`;
        }

        function openTab(idx) {
            currentActiveTab = idx;
            for(let i=0; i<3; i++) {
                document.getElementById('g'+i).classList.toggle('active', i===idx);
                document.getElementById('b'+i).classList.toggle('active', i===idx);
                if(globalPrediksiData[idx]) {
                    document.getElementById('g'+idx).innerHTML = globalPrediksiData[idx].map(it => generateCardHTML(it, idx)).join('');
                }
            }
        }

        function updateAllTimers() {
            document.querySelectorAll('.cm-timer-value').forEach(el => {
                el.innerText = new Date().toLocaleTimeString('id-ID');
            });
        }

        function searchPasaran() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let sGrid = document.getElementById('searchGrid');
            if (input === "") { sGrid.classList.remove('active'); document.getElementById('g'+currentActiveTab).classList.add('active'); return; }
            document.querySelectorAll('.grid-container').forEach(g => g.classList.remove('active'));
            sGrid.classList.add('active');
            let all = [...globalPrediksiData[0], ...globalPrediksiData[1], ...globalPrediksiData[2]];
            sGrid.innerHTML = all.filter(it => it.pasaran.toLowerCase().includes(input)).map(it => generateCardHTML(it, 3)).join('');
        }

        function showModalDirect(enc) {
            const it = JSON.parse(atob(enc));
            document.getElementById('modalBody').innerHTML = `
                <div class="modal-header"><h3>${it.pasaran}</h3><p>${it.tanggal}</p></div>
                <div class="divider">RANGKUMAN</div>
                <table class="modal-table">
                    <tr><td>BBFS 7D</td><td class="val-text">${it.bbfs||'-'}</td></tr>
                    <tr><td>4D (BB)</td><td class="val-text">${it.d4||'-'}</td></tr>
                    <tr><td>2D (BB)</td><td class="val-text">${it.d2||'-'}</td></tr>
                </table>
                <a href="${LINK_PASANG_SEKARANG}" target="_blank" class="btn-pasang">HAJAR SEKARANG 🎰</a>`;
            document.getElementById('prediksiModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('prediksiModal').style.display = 'none'; }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
    </script>
</body>
</html>
