        .grid-container { display: none; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .grid-container.active { display: grid; }
        .card-mini { background: var(--card-bg); border-radius: 28px; overflow: hidden; position: relative; transition: 0.3s; display: flex; flex-direction: column; align-items: center; padding-bottom: 15px; box-shadow: var(--card-shadow); border: 1px solid var(--card-border); cursor: pointer; }

        #g0 .card-mini { border-bottom: 4px solid var(--neon-yellow); }

        .skeleton { background: #1a1a1a; height: 160px; border-radius: 28px; border: 1px solid var(--card-border); position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .cm-header { padding: 18px 10px 5px; text-align: center; }

        .cm-date { font-size: 10px; color: #777; font-weight: 700; margin-top: 3px; letter-spacing: 1px; }
        .cm-timer-box { background: rgba(0,0,0,0.08); width: 88%; padding: 8px 5px; border-radius: 20px; border: 1px solid var(--card-border); margin-bottom: 12px; text-align: center; }

        .login-box input { padding: 18px; border-radius: 15px; border: 1px solid #333; background: #251812; color: #fff; width: 100%; margin: 20px 0 15px; text-align: center; font-size: 20px; font-weight: 900; box-sizing: border-box; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); border-radius: 35px; width: 92%; max-width: 450px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--card-border); position: relative; padding-bottom: 20px; }
        .close-btn { position: absolute; right: 15px; top: 15px; background: var(--accent-gold); color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 10; }
        .modal-header { padding: 25px 20px 10px; text-align: center; }
        .modal-header h3 { font-family: 'Montserrat'; font-weight: 900; margin: 0; color: var(--text-color); }

        .divider { background: rgba(209, 138, 74, 0.05); color: var(--accent-gold); font-family: 'Montserrat'; font-weight: 900; font-size: 11px; padding: 8px; text-align: center; border-top: 1px solid var(--card-border); margin: 10px 0; }
        .modal-table { width: 100%; border-collapse: collapse; }
        .modal-table td { padding: 6px 20px; font-weight: 700; border-bottom: 1px solid var(--card-border); }

        @keyframes shine { 0% { background-position: 0% center; } 50% { background-position: 100% center; } 100% { background-position: 0% center; } }
        @keyframes heartbeat { 0% { transform: scale(1); } 14% { transform: scale(1.08); } 28% { transform: scale(1); } 42% { transform: scale(1.08); } 70% { transform: scale(1); } }

        .fab-wa { position: fixed; width: 60px; height: 60px; bottom: 65px; right: 20px; background: #25d366; color: #FFF; border-radius: 50%; z-index: 2001; display: flex; align-items: center; justify-content: center; border: 3px solid #fff; animation: pulse 2s infinite; }

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwbNAAAWRC2IsLW_ZsyZfcq3SOqgXr8RFqhxGJTrcTE6cZDl0y2QDGAeXnDP5uXUQ54/exec";
let LINK_PASANG_SEKARANG = "";
let globalPrediksiData = [];
let currentActiveTab = 0;

const jadwalPasaran = {
    "totomacau pagi": { time: "00:00", off: [] }, "singapore": { time: "17:30", off: [2, 5] }, "hongkong lotto": { time: "22:59", off: [] },
    "kentucky midday": { time: "00:05", off: [] }, "florida midday": { time: "00:20", off: [] }, "huahin 0100": { time: "00:45", off: [] }, "new york midday": { time: "01:15", off: [] }, "bangkok 0130": { time: "01:15", off: [] }, "carolina day": { time: "01:45", off: [] }, "brunei 02": { time: "02:30", off: [] }, "oregon 03": { time: "02:50", off: [] }, "oregon 06": { time: "05:50", off: [] }, "california": { time: "08:25", off: [] }, "florida evening": { time: "08:35", off: [] }, "oregon 09": { time: "08:50", off: [] }, "bangkok 0930": { time: "09:15", off: [] }, "new york evening": { time: "09:25", off: [] }, "carolina evening": { time: "10:17", off: [] }, "toto cambodia": { time: "10:45", off: [] }, "chelsea 11": { time: "11:00", off: [] }, "oregon 12": { time: "11:50", off: [] }, "poipet 12": { time: "12:15", off: [] }, "bullseye": { time: "13:00", off: [] }, "totomacau siang": { time: "13:00", off: [] }, "sydney lotto": { time: "13:49", off: [] }, "brunei 14": { time: "14:30", off: [] }, "chelsea 15": { time: "15:00", off: [] }, "poipet 15": { time: "15:15", off: [] }, "totomali 1530": { time: "15:15", off: [] }, "totomacau sore": { time: "16:00", off: [] }, "huahin 1630": { time: "16:15", off: [] }, "king kong 4d sore": { time: "17:00", off: [] }, "magnum 4d": { time: "18:10", off: [2, 4, 5] }, "totomacau malam i": { time: "19:00", off: [] }, "chelsea 19": { time: "19:00", off: [] }, "poipet 19": { time: "19:30", off: [] }, "pcso": { time: "19:50", off: [0] }, "totomali 2030": { time: "20:15", off: [] }, "huahin 2100": { time: "20:45", off: [] }, "chelsea 21": { time: "21:00", off: [] }, "nevada": { time: "21:15", off: [] }, "brunei 21": { time: "21:30", off: [] }, "totomacau malam ii": { time: "22:00", off: [] }, "poipet 22": { time: "22:30", off: [] }, "totomacau malam iii": { time: "23:00", off: [] }, "totomali 2330": { time: "23:15", off: [] }, "king kong 4d malam": { time: "23:30", off: [] }
};

function initApp() {
    showSkeletons();
    const savedTheme = localStorage.getItem('app_theme');
    if (savedTheme === 'light') { document.body.classList.add('light-mode'); updateThemeIcon(true); }

    fetch(`${API_URL}?action=getPublicSettings`).then(res => res.json()).then(s => {
        if(s && s.wa) { 
            const waUrl = "https://wa.me/" + s.wa.toString().replace(/\D/g, '');
            document.getElementById('wa-floating').href = waUrl;
            document.getElementById('wa-floating').style.display = 'flex';
            LINK_PASANG_SEKARANG = s.referral || ""; 
        }
    });

    const savedSandi = localStorage.getItem('member_sandi');
    if (savedSandi) autoLogin(savedSandi);
    else document.getElementById('login-screen').style.display = 'flex';
}

function autoLogin(sandi) {
    fetch(`${API_URL}?action=getPrediksiData&sandi=${sandi}`).then(res => res.json()).then(response => {
        if (response === "SALAH") { localStorage.removeItem('member_sandi'); document.getElementById('login-screen').style.display = 'flex'; }
        else handleDataSuccess(response);
    });
}

function manualLogin() {
    let sandi = document.getElementById('sandiInput').value;
    let pesanError = document.getElementById('pesan-error');
    pesanError.style.display = 'block'; pesanError.style.color = '#facc15'; pesanError.innerText = 'MENYAMBUNGKAN...';

    fetch(`${API_URL}?action=getPrediksiData&sandi=${sandi}`).then(res => res.json()).then(response => {
        if (response === "SALAH") { pesanError.style.color = '#ff4444'; pesanError.innerText = 'PIN INVALID!'; }
        else { localStorage.setItem('member_sandi', sandi); handleDataSuccess(response); }
    }).catch(err => { pesanError.innerText = 'KONEKSI GAGAL!'; });
}

function handleDataSuccess(response) {
    document.getElementById('login-screen').style.display = 'none';
    globalPrediksiData = response.cards || response; 
    openTab(0); setInterval(updateAllTimers, 1000);
}

function getDiffMs(name) {
    let pasaranName = name.toLowerCase().replace("prediksi ", "").trim();
    let sch = jadwalPasaran[pasaranName]; if(!sch) return 999999999;
    const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const nowWIB = new Date(utc + (3600000 * 7));
    let target = new Date(nowWIB.getTime()); let p = sch.time.split(':');
    target.setHours(parseInt(p[0]), parseInt(p[1]), 0, 0);
    let end = new Date(target.getTime() + 15 * 60000);
    if (nowWIB >= target && nowWIB < end) return -1;
    if (nowWIB >= end) target.setDate(target.getDate() + 1);
    while (sch.off.includes(target.getDay())) target.setDate(target.getDate() + 1);
    return target.getTime() - nowWIB.getTime();
}

function generateCardHTML(item, tabIdx, itemIdx) {
    const colors = ['var(--neon-yellow)', 'var(--neon-orange)', 'var(--neon-blue)'];
    const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const nowWIB = new Date(utc + (3600000 * 7));
    
    // CEK APAKAH LIBUR ATAU BBFS KOSONG
    const isSgpLibur = item.pasaran.toLowerCase().includes("singapore") && (nowWIB.getDay() === 2 || nowWIB.getDay() === 5);
    const isKosong = !item.bbfs || item.bbfs === "" || item.bbfs === "-";

    const btnLabel = isSgpLibur ? "SGP LIBUR" : (isKosong ? "HUBUNGI ADMIN" : "PREDIKSI");
    const btnCol = isSgpLibur ? '#222' : (colors[tabIdx] || 'var(--accent-gold)');
    const btnClass = "cm-btn" + (isKosong && !isSgpLibur ? " btn-pulse-red" : "");
    
    return `<div class="card-mini" data-pasaran="${item.pasaran}" onclick="showModalByIdx(${tabIdx}, ${itemIdx})">
        <div class="cm-header"><div class="cm-title">${item.pasaran}</div><div class="cm-date">${item.tanggal}</div></div>
        <div class="cm-timer-box"><div class="cm-timer-value">00:00:00</div></div>
        <button class="${btnClass}" style="background:${isKosong && !isSgpLibur ? '#ff0000' : btnCol}; color:${isKosong && !isSgpLibur ? '#fff' : ''}">${btnLabel}</button></div>`;
}

function renderGrid(idx) {
    const g = document.getElementById('g' + idx);
    if(!globalPrediksiData || !globalPrediksiData[idx]) return;
    let data = [...globalPrediksiData[idx]];
    data.sort((a, b) => getDiffMs(a.pasaran) - getDiffMs(b.pasaran));
    g.innerHTML = data.map((item, i) => generateCardHTML(item, idx, i)).join('');
}

function openTab(idx) {
    currentActiveTab = idx; document.getElementById('searchInput').value = "";
    for(let i=0; i<3; i++) {
        document.getElementById('g'+i).classList.toggle('active', i===idx);
        document.getElementById('b'+i).classList.toggle('active', i===idx);
        renderGrid(i);
    }
}

function showModalByIdx(tabIdx, itemIdx) {
    if(!globalPrediksiData[tabIdx] || !globalPrediksiData[tabIdx][itemIdx]) return;
    const it = globalPrediksiData[tabIdx][itemIdx];
    const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const nowWIB = new Date(utc + (3600000 * 7));
    
    const isKosong = !it.bbfs || it.bbfs === "" || it.bbfs === "-";

    if (it.pasaran.toLowerCase().includes("singapore") && (nowWIB.getDay() === 2 || nowWIB.getDay() === 5)) {
        document.getElementById('modalBody').innerHTML = `<div style="padding:40px;text-align:center;font-weight:900;">PASARAN SINGAPORE LIBUR</div>`;
    } else if (isKosong) {
        document.getElementById('modalBody').innerHTML = `
            <div style="padding:40px;text-align:center;">

}

function updateAllTimers() {
    const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const nowWIB = new Date(utc + (3600000 * 7));
    document.querySelectorAll('.card-mini').forEach(card => {
        let name = card.getAttribute('data-pasaran'); let diff = getDiffMs(name);
        let el = card.querySelector('.cm-timer-value'); if(!el) return;
        if(diff === -1) { el.innerText = "UNDI"; el.style.color = "#ff4444"; }
        else {
            let h = Math.floor(diff / 3600000).toString().padStart(2,'0');
            let m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            let s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
            el.innerText = `${h}:${m}:${s}`; el.style.color = "var(--text-color)";
        }
    });
}

function showSkeletons() {
    for(let i=0; i<3; i++) { document.getElementById('g'+i).innerHTML = '<div class="skeleton"></div>'.repeat(6); }
}

function searchPasaran() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let sGrid = document.getElementById('searchGrid');
    if (input === "") { sGrid.classList.remove('active'); document.getElementById('g'+currentActiveTab).classList.add('active'); return; }
    document.querySelectorAll('.grid-container').forEach(g => g.classList.remove('active'));
    sGrid.classList.add('active');
    let allPagi = globalPrediksiData[0] || [];
    let allSiang = globalPrediksiData[1] || [];
    let allMalam = globalPrediksiData[2] || [];
    let resPagi = allPagi.filter(it => it.pasaran.toLowerCase().includes(input)).map((it, i) => generateCardHTML(it, 0, i));
    let resSiang = allSiang.filter(it => it.pasaran.toLowerCase().includes(input)).map((it, i) => generateCardHTML(it, 1, i));
    let resMalam = allMalam.filter(it => it.pasaran.toLowerCase().includes(input)).map((it, i) => generateCardHTML(it, 2, i));
    sGrid.innerHTML = [...resPagi, ...resSiang, ...resMalam].join('');
}

function closeModal() { document.getElementById('prediksiModal').style.display = 'none'; }
function toggleTheme() { document.body.classList.toggle('light-mode'); updateThemeIcon(!document.body.classList.contains('light-mode')); }
function updateThemeIcon(isDark) { document.getElementById('themeIcon').innerHTML = isDark ? '<path d="M12 7a5 5 0 100 10 5 5 0 000-10zM2 13h2a1 1 0 100-2H2a1 1 0 100 2zm18 0h2a1 1 0 100-2h-2a1 1 0 100 2zM11 2v2a1 1 0 102 0V2a1 1 0 10-2 0zm0 18v2a1 1 0 102 0v-2a1 1 0 10-2 0z"/>' : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>'; }
