<!DOCTYPE html>
<html lang="id">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <title>KANG RADEN - VIP JOSJIS</title>

    <meta property="og:title" content="KANG RADEN - VIP JOSJIS">
    <meta property="og:description" content="Eksklusif Member RADEN - Angka Mutlak Josjis">
    <meta property="og:image" content="https://i.postimg.cc/43Q4SGNF/SCR-20260410-ousn.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/radenvip/josjis">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        @import url('https://fonts.cdnfonts.com/css/ds-digital');
        :root { --bg-color: #000; --text-color: #fff; --card-bg: #111; --accent-gold: #D4AF37; --neon-yellow: #facc15; --neon-orange: #fb923c; --neon-blue: #38bdf8; --card-border: rgba(255,255,255,0.08); }
        body.light-mode { --bg-color: #f0f2f5; --text-color: #1a1a1a; --card-bg: #fff; --card-border: rgba(0,0,0,0.08); }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Rajdhani', sans-serif; margin: 0; transition: 0.4s; overflow-x: hidden; }

        /* HEADER & TABS */
        .app-header { display: flex; align-items: center; padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 1000; }
        .header-logo { width: 35px; height: 35px; margin-right: 12px; border-radius: 5px; }
        .header-title { font-family: 'Montserrat'; font-weight: 900; color: var(--accent-gold); font-size: 16px; text-transform: uppercase; }
        .tab-menu { display: inline-flex; background: var(--card-bg); padding: 6px; border-radius: 50px; border: 1px solid var(--card-border); margin: 20px auto; display: flex; width: max-content; }
        .tab-btn { border: none; background: transparent; color: #888; padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: 11px; cursor: pointer; }
        #b0.active { background: var(--neon-yellow); color: #000; }
        #b1.active { background: var(--neon-orange); color: #000; }
        #b2.active { background: var(--neon-blue); color: #000; }

        /* CARDS */
        .grid-container { display: none; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; }
        .grid-container.active { display: grid; }
        .card-mini { background: var(--card-bg); border-radius: 25px; padding-bottom: 15px; border: 1px solid var(--card-border); text-align: center; cursor: pointer; }
        .cm-title { font-family: 'Montserrat'; font-weight: 900; font-size: 13px; padding-top: 15px; }
        .cm-timer-value { font-family: 'DS-Digital'; font-size: 28px; margin: 10px 0; }
        .cm-btn { width: 85%; padding: 10px; border-radius: 12px; border: none; font-weight: 900; font-size: 10px; cursor: pointer; }
        
        /* ANIMASI */
        @keyframes pulse-red { 0%, 100% { background: #ff0000; } 50% { background: #aa0000; } }
        .btn-pulse-red { animation: pulse-red 1.5s infinite; color: #fff !important; }

        /* LOGIN & MODAL */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-box { text-align: center; width: 100%; max-width: 320px; }
        .login-box input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; margin: 20px 0; text-align: center; font-size: 18px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); border-radius: 30px; width: 90%; max-width: 400px; padding-bottom: 20px; border: 1px solid var(--card-border); position: relative; }
        .btn-pasang { display: block; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; background: var(--accent-gold); color: #000; font-weight: 900; text-align: center; text-decoration: none; }
        .footer-marquee { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 0; overflow: hidden; white-space: nowrap; z-index: 1000; }
        .marquee-text { display: inline-block; font-family: 'Montserrat'; font-weight: 900; font-size: 11px; color: #555; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body onload="initApp()">

    <div id="login-screen">
        <div class="login-box">
            <img src="https://i.postimg.cc/43Q4SGNF/SCR-20260410-ousn.png" style="width:120px;">
            <h2 style="color:var(--accent-gold); margin:10px 0;">KANG RADEN VIP</h2>
            <input type="password" id="sandiInput" placeholder="PIN MEMBER" inputmode="numeric">
            <button onclick="manualLogin()" style="width:100%; padding:15px; border-radius:12px; background:var(--accent-gold); font-weight:900; cursor:pointer;">MASUK SISTEM</button>
            <div id="pesan-error" style="color:#ff4444; margin-top:10px; display:none;">PIN INVALID!</div>
        </div>
    </div>

    <div id="main-app">
        <header class="app-header">
            <img src="https://i.postimg.cc/43Q4SGNF/SCR-20260410-ousn.png" class="header-logo">
            <div class="header-title">KANG RADEN VIP</div>
        </header>
        <div class="tab-menu">
            <button id="b0" class="tab-btn active" onclick="openTab(0)">PAGI</button>
            <button id="b1" class="tab-btn" onclick="openTab(1)">SIANG</button>
            <button id="b2" class="tab-btn" onclick="openTab(2)">MALAM</button>
        </div>
        <div id="g0" class="grid-container active"></div>
        <div id="g1" class="grid-container"></div>
        <div id="g2" class="grid-container"></div>
    </div>

    <div class="footer-marquee">
        <div class="marquee-text">--- RUMUS ANDALAN RADEN --- KANG RADEN VIP PREDICTION --- SALAM JOSJISS!! ---</div>
    </div>

    <div id="prediksiModal" class="modal"><div class="modal-content"><span onclick="closeModal()" style="position:absolute; right:15px; top:15px; color:var(--accent-gold); cursor:pointer; font-weight:bold;">&times; CLOSE</span><div id="modalBody" style="padding-top:40px;"></div></div></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwbNAAAWRC2IsLW_ZsyZfcq3SOqgXr8RFqhxGJTrcTE6cZDl0y2QDGAeXnDP5uXUQ54/exec";
        let globalPrediksiData = []; let LINK_PASANG = "";

        const jadwalPasaran = { "totomacau pagi": { time: "00:00", off: [] }, "singapore": { time: "17:30", off: [2, 5] }, "hongkong lotto": { time: "22:59", off: [] } };

        function initApp() {
            const savedSandi = localStorage.getItem('member_sandi');
            if (savedSandi) autoLogin(savedSandi);
            else document.getElementById('login-screen').style.display = 'flex';
        }

        function manualLogin() {
            let sandi = document.getElementById('sandiInput').value;
            fetch(`${API_URL}?action=getPrediksiData&sandi=${sandi}`).then(res => res.json()).then(res => {
                if(res === "SALAH") document.getElementById('pesan-error').style.display = 'block';
                else { localStorage.setItem('member_sandi', sandi); handleDataSuccess(res); }
            });
        }

        function autoLogin(sandi) {
            fetch(`${API_URL}?action=getPrediksiData&sandi=${sandi}`).then(res => res.json()).then(res => { if(res !== "SALAH") handleDataSuccess(res); });
        }

        function handleDataSuccess(res) {
            document.getElementById('login-screen').style.display = 'none';
            globalPrediksiData = res.cards; LINK_PASANG = res.referral;
            openTab(0); setInterval(updateTimers, 1000);
        }

        function generateCard(item, idx) {
            const isKosong = !item.bbfs || item.bbfs === "-";
            const btnClass = "cm-btn" + (isKosong ? " btn-pulse-red" : "");
            const btnLabel = isKosong ? "HUBUNGI ADMIN" : "PREDIKSI";
            return `<div class="card-mini" onclick="showModal('${btoa(JSON.stringify(item))}')">
                <div class="cm-title">${item.pasaran}</div><div class="cm-timer-value" data-pasaran="${item.pasaran}">00:00:00</div>
                <button class="${btnClass}">${btnLabel}</button></div>`;
        }

        function openTab(idx) {
            for(let i=0; i<3; i++) {
                document.getElementById('g'+i).classList.toggle('active', i===idx);
                document.getElementById('b'+i).classList.toggle('active', i===idx);
                if(globalPrediksiData[i]) document.getElementById('g'+i).innerHTML = globalPrediksiData[i].map(it => generateCard(it, i)).join('');
            }
        }

        function updateTimers() {
            document.querySelectorAll('.cm-timer-value').forEach(el => {
                // Logika timer sederhana: Anda bisa melengkapinya sesuai jadwal
                el.innerText = new Date().toLocaleTimeString('id-ID');
            });
        }

        function showModal(enc) {
            const it = JSON.parse(atob(enc));
            const isKosong = !it.bbfs || it.bbfs === "-";
            document.getElementById('modalBody').innerHTML = isKosong ? 
                `<div style="text-align:center;"><h3>ANGKA SEDANG DIRACIK</h3><p>Hubungi Admin via WA</p></div>` :
                `<div style="text-align:center;"><h3>${it.pasaran}</h3><p>BBFS: ${it.bbfs}</p><a href="${LINK_PASANG}" class="btn-pasang">HAJAR SEKARANG!</a></div>`;
            document.getElementById('prediksiModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('prediksiModal').style.display = 'none'; }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
    </script>
</body>
</html>
